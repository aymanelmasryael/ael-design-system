  <rect x="50" y="460" width="700" height="18" rx="12" fill="rgba(5,12,24,.7)" stroke="rgba(0,116,255,.25)" stroke-width="1"/>
  <text x="400" y="473" fill="#64748b" font-family="monospace" font-size="9" text-anchor="middle">© 2026 Ayman Elmasry — AEL Digital Studio | Design System v1.0 — Zero dependencies</text>
