  <text x="365" y="338" font-family="Inter,sans-serif" font-weight="400" font-size="12" fill="#5A6B8A">Multiple states, sizes, and styles for every component type</text>

  <rect x="630" y="260" width="255" height="130" rx="12" fill="rgba(0,116,255,0.04)" stroke="rgba(0,116,255,0.10)" stroke-width="1"/>
